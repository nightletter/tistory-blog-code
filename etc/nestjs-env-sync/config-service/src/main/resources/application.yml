server:
  port: 8888
  shutdown: graceful
  tomcat:
    connection-timeout: 2s
    keep-alive-timeout: 15s

management:
  endpoints:
    web:
      exposure:
        include: "refresh"

spring:
  application:
    name: config-service
  profiles:
    active: native
  lifecycle:
    timeout-per-shutdown-phase: 10s
  cloud:
    config:
      server:
        native:
          search-locations: /Users/khc/nestjs-env-sync/env
          fail-on-error: true
